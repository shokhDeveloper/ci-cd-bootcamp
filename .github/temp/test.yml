name: Test
on: push
jobs: 
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Install
              run: npm ci
            - name: Lint
              run: npm run lint
    test: 
        needs: [lint]
        runs-on: ubuntu-latest
        strategy:
          matrix:
            node: [18, 20, 22, 24]
        steps: 
            - name: Checkout
              uses: actions/checkout@v6
            - name: CheckNode
              uses: actions/setup-node@v6
              with:
                node-version: ${{matrix.node}}
            - name: Install
              run: npm ci
            - name: Test
              env:
                PORT: ${{secrets.PORT}}
              run: npm run test